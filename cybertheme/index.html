<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cyber Theme Scripts</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0b0f1a; color:#e6fbff; padding:40px; }
    h1 { color:#00f0ff; }
    .box { background:#11182b; padding:20px; border-radius:10px; margin-bottom:20px; }
    textarea { width:100%; height:220px; background:#05070d; color:#00f0ff; border:1px solid #00f0ff33; padding:10px; }
    button { margin-top:10px; padding:10px 15px; border:none; background:#00f0ff; color:black; cursor:pointer; border-radius:6px; }
    ol { line-height:1.6; }
  </style>
</head>
<body>

<h1>Cyber Theme</h1>

<div class="box">
  <h2>Bookmarklet</h2>
  <ol>
    <li>Copy the code below</li>
    <li>Create a new bookmark</li>
    <li>Paste into the URL field</li>
    <li>Click it on any website</li>
  </ol>

  <textarea id="bookmarklet">javascript:(function(){if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',run);}else{run();}function run(){(function(){if(window.__ct_full)return;window.__ct_full=true;const cleanup=document.createElement('style');cleanup.textContent='*{background-image:none!important;}';document.head.appendChild(cleanup);const style=document.createElement('style');style.textContent=':root{--ct-accent:#00f0ff;--ct-secondary:#ff2bd6;}body{background:#05070d!important;color:#e6fbff!important;}*{border-color:rgba(0,255,255,0.2)!important;text-shadow:0 0 2px rgba(0,255,255,0.15);}button,.btn{background:#0c1224!important;border:1px solid rgba(0,255,255,0.4)!important;color:var(--ct-accent)!important;box-shadow:0 0 6px rgba(0,255,255,0.2);}button:hover,.btn:hover{box-shadow:0 0 10px rgba(0,255,255,0.35),0 0 20px rgba(255,0,255,0.15);}input,select,textarea{background:#0c1224!important;border:1px solid rgba(0,255,255,0.4)!important;color:#e6fbff!important;}a{color:var(--ct-secondary)!important;}a:hover{text-shadow:0 0 6px var(--ct-secondary);}img{filter:contrast(1.1) saturate(1.1);}::-webkit-scrollbar{width:8px;}::-webkit-scrollbar-thumb{background:#ff2bd6;}';document.head.appendChild(style);const bg=document.createElement('div');bg.style.position='fixed';bg.style.inset='0';bg.style.zIndex='-1';bg.style.pointerEvents='none';bg.style.background='radial-gradient(circle at 50% 20%,rgba(0,255,255,0.08),transparent 60%),radial-gradient(circle at 50% 80%,rgba(255,0,255,0.06),transparent 70%),#05070d';document.body.appendChild(bg);const vignette=document.createElement('div');vignette.style.position='fixed';vignette.style.inset='0';vignette.style.pointerEvents='none';vignette.style.zIndex='999999';vignette.style.background='radial-gradient(circle at center,transparent 60%,rgba(0,0,0,0.4) 85%,rgba(0,0,0,0.7) 100%)';document.body.appendChild(vignette);const light=document.createElement('div');light.style.position='fixed';light.style.inset='0';light.style.pointerEvents='none';light.style.zIndex='999998';light.style.opacity='0.4';document.body.appendChild(light);window.addEventListener('mousemove',function(e){const x=e.clientX/window.innerWidth*100;const y=e.clientY/window.innerHeight*100;light.style.background='radial-gradient(circle at '+x+'% '+y+'%,rgba(0,255,255,0.15),transparent 70%)';});const canvas=document.createElement('canvas');canvas.style.position='fixed';canvas.style.inset='0';canvas.style.pointerEvents='none';canvas.style.zIndex='999997';document.body.appendChild(canvas);const ctx=canvas.getContext('2d');function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}resize();window.addEventListener('resize',resize);let t=0;function animate(){t+=0.004;ctx.clearRect(0,0,canvas.width,canvas.height);for(let y=0;y<canvas.height;y+=6){const wave=Math.sin(y*0.007+t)*2;ctx.fillStyle='rgba(0,255,255,0.06)';ctx.fillRect(wave,y,canvas.width,2);ctx.fillStyle='rgba(0,255,255,0.025)';ctx.fillRect(wave,y+2,canvas.width,1);}requestAnimationFrame(animate);}animate();const tint=document.createElement('div');tint.style.position='fixed';tint.style.inset='0';tint.style.pointerEvents='none';tint.style.zIndex='999996';tint.style.background='rgba(0,255,255,0.06)';tint.style.mixBlendMode='screen';document.body.appendChild(tint);document.documentElement.style.filter='contrast(1.15) saturate(1.2)';})();}})();</textarea>
  <button onclick="copyText('bookmarklet')">Copy Bookmarklet</button>
</div>

<div class="box">
  <h2>Console Script</h2>
  <p>Paste this directly into the browser console.</p>

  <textarea id="console">(function () {
  if (window.__ct_full) return;
  window.__ct_full = true;

  /* ---------------- CLEAN OLD EFFECTS ---------------- */
  const cleanup = document.createElement("style");
  cleanup.textContent = `
    * {
      background-image: none !important;
    }
  `;
  document.head.appendChild(cleanup);

  /* ---------------- BASE STYLE ---------------- */
  const style = document.createElement("style");
  style.textContent = `
    :root {
      --ct-accent: #00f0ff;
      --ct-secondary: #ff2bd6;
    }

    body {
      background: #05070d !important;
      color: #e6fbff !important;
    }

    * {
      border-color: rgba(0,255,255,0.2) !important;
      text-shadow: 0 0 2px rgba(0,255,255,0.15);
    }

    button, .btn {
      background: #0c1224 !important;
      border: 1px solid rgba(0,255,255,0.4) !important;
      color: var(--ct-accent) !important;
      box-shadow: 0 0 6px rgba(0,255,255,0.2);
    }

    button:hover, .btn:hover {
      box-shadow:
        0 0 10px rgba(0,255,255,0.35),
        0 0 20px rgba(255,0,255,0.15);
    }

    input, select, textarea {
      background: #0c1224 !important;
      border: 1px solid rgba(0,255,255,0.4) !important;
      color: #e6fbff !important;
    }

    a {
      color: var(--ct-secondary) !important;
    }

    a:hover {
      text-shadow: 0 0 6px var(--ct-secondary);
    }

    img {
      filter: contrast(1.1) saturate(1.1);
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: #ff2bd6;
    }
  `;
  document.head.appendChild(style);

  /* ---------------- GLOBAL BACKGROUND ---------------- */
  const bg = document.createElement("div");
  bg.style.position = "fixed";
  bg.style.inset = "0";
  bg.style.zIndex = "-1";
  bg.style.pointerEvents = "none";

  bg.style.background = `
    radial-gradient(circle at 50% 20%,
      rgba(0,255,255,0.08),
      transparent 60%),
    radial-gradient(circle at 50% 80%,
      rgba(255,0,255,0.06),
      transparent 70%),
    #05070d
  `;

  document.body.appendChild(bg);

  /* ---------------- VIGNETTE ---------------- */
  const vignette = document.createElement("div");
  vignette.style.position = "fixed";
  vignette.style.inset = "0";
  vignette.style.pointerEvents = "none";
  vignette.style.zIndex = "999999";
  vignette.style.background = `
    radial-gradient(circle at center,
      transparent 60%,
      rgba(0,0,0,0.4) 85%,
      rgba(0,0,0,0.7) 100%)
  `;
  document.body.appendChild(vignette);

  /* ---------------- LIGHT ---------------- */
  const light = document.createElement("div");
  light.style.position = "fixed";
  light.style.inset = "0";
  light.style.pointerEvents = "none";
  light.style.zIndex = "999998";
  light.style.opacity = "0.4";
  document.body.appendChild(light);

  window.addEventListener("mousemove", (e) => {
    const x = e.clientX / window.innerWidth * 100;
    const y = e.clientY / window.innerHeight * 100;

    light.style.background = `
      radial-gradient(circle at ${x}% ${y}%,
        rgba(0,255,255,0.15),
        transparent 70%)
    `;
  });

  /* ---------------- SCANLINES ---------------- */
  const canvas = document.createElement("canvas");
  canvas.style.position = "fixed";
  canvas.style.inset = "0";
  canvas.style.pointerEvents = "none";
  canvas.style.zIndex = "999997";
  document.body.appendChild(canvas);

  const ctx = canvas.getContext("2d");

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener("resize", resize);

  let t = 0;

  function animate() {
    t += 0.004;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < canvas.height; y += 6) {
      const wave = Math.sin(y * 0.007 + t) * 2;

      ctx.fillStyle = "rgba(0,255,255,0.06)";
      ctx.fillRect(wave, y, canvas.width, 2);

      ctx.fillStyle = "rgba(0,255,255,0.025)";
      ctx.fillRect(wave, y + 2, canvas.width, 1);
    }

    requestAnimationFrame(animate);
  }

  animate();

  /* ---------------- GLOBAL CYAN TINT ---------------- */
  const tint = document.createElement("div");
  tint.style.position = "fixed";
  tint.style.inset = "0";
  tint.style.pointerEvents = "none";
  tint.style.zIndex = "999996";
  tint.style.background = "rgba(0,255,255,0.06)";
  tint.style.mixBlendMode = "screen";
  document.body.appendChild(tint);

  /* ---------------- COLOR BOOST ---------------- */
  document.documentElement.style.filter = "contrast(1.15) saturate(1.2)";

})();</textarea>

  <button onclick="copyText('console')">Copy Console Script</button>
</div>

<script>
function copyText(id){
  const el=document.getElementById(id);
  el.select();
  document.execCommand('copy');
  alert('Copied!');
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dark Theme Script</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0b0f1a; color:#e6fbff; padding:40px; }
    h1 { color:#00f0ff; }
    .box { background:#11182b; padding:20px; border-radius:10px; margin-bottom:20px; }
    textarea { width:100%; height:220px; background:#05070d; color:#00f0ff; border:1px solid #00f0ff33; padding:10px; }
    button { margin-top:10px; padding:10px 15px; border:none;  color:black; cursor:pointer; border-radius:6px; }
    ol { line-height:1.6; }
  </style>
</head>
<body>

<h1>Dark Theme</h1>

<div class="box">
  <h2>Bookmarklet</h2>
  <ol>
    <li>Copy the code below</li>
    <li>Create a new bookmark</li>
    <li>Paste into the URL field</li>
    <li>Click it on any website</li>
  </ol>

  <textarea id="bookmarklet">javascript:(()=>{const css=`:root{color-scheme:dark!important;--bg0:#141414;--bg1:#1b1b1b;--bg2:#222222;--bg3:#292929;--hover:#303030;--active:#383838;--text:#d2d2d2;--textSoft:#bbbbbb;--textFaint:#969696;--heading:#e2e2e2;--accent:#8cb4ff;--accentVisited:#b39ddb;--selectionBg:#3a3a3a;--selectionText:#ffffff;--codeBg:#1d1d1d;--inputBg:#202020}html,body{background-color:var(--bg0)!important;color:var(--text)!important;line-height:1.55!important;-webkit-font-smoothing:antialiased!important;text-rendering:optimizeLegibility!important}body,p,span,li,td,th,label,small,caption,figcaption,blockquote,dd,dt{color:var(--text)!important}h1,h2,h3,h4,h5,h6,strong,b{color:var(--heading)!important}small,sub,sup{color:var(--textFaint)!important}a,a *{color:var(--accent)!important}a:visited,a:visited *{color:var(--accentVisited)!important}*{text-shadow:none!important;box-shadow:none!important;border-color:transparent!important;outline-color:transparent!important}main,section,article,aside,nav,header,footer,dialog,menu,details,fieldset,figure,figcaption,address,.card,.panel,.sidebar,.drawer,.modal,.popup,.popover,.dropdown,.tooltip,.toast,[role="dialog"],[role="menu"],[role="tooltip"],[class*="card"],[class*="panel"],[class*="modal"],[class*="popup"],[class*="popover"],[class*="dropdown"],[class*="sidebar"],[class*="toolbar"],[class*="titlebar"]{background-color:var(--bg1)!important}main main,section section,article article,aside aside,div div,.card .card,.panel .panel,.modal .modal,.popup .popup{background-color:var(--bg2)!important}main main main,section section section,article article article,div div div{background-color:var(--bg3)!important}input,textarea,select,button,optgroup,option{background-color:var(--inputBg)!important;color:var(--text)!important;border:none!important}input::placeholder,textarea::placeholder{color:var(--textFaint)!important}button:hover,input:hover,textarea:hover,select:hover{background-color:var(--hover)!important}button:active,input:focus,textarea:focus,select:focus{background-color:var(--active)!important;outline:none!important}table{background-color:var(--bg1)!important;color:var(--text)!important;border-collapse:collapse!important}thead,tfoot{background-color:var(--bg2)!important}tbody tr:nth-child(odd){background-color:#1d1d1d!important}tbody tr:nth-child(even){background-color:#242424!important}tbody tr:hover{background-color:#303030!important}td,th{border:none!important;padding:.5em!important}pre,code,kbd,samp{background-color:var(--codeBg)!important;color:#d7d7d7!important;border:none!important}ul,ol,li,dl{background-color:transparent!important}hr{border:none!important;height:1px!important;background-color:#303030!important}img,video,canvas,picture,svg,iframe{background-color:transparent!important}svg text,svg tspan{fill:var(--text)!important}::selection{background-color:var(--selectionBg)!important;color:var(--selectionText)!important}::-webkit-scrollbar{width:12px;height:12px}::-webkit-scrollbar-track{background-color:var(--bg0)!important}::-webkit-scrollbar-thumb{background-color:#404040!important;border-radius:999px!important}::-webkit-scrollbar-thumb:hover{background-color:#505050!important}#root,#__next,[data-reactroot]{background-color:var(--bg0)!important}[class*="message"],[class*="chat"],[class*="conversation"]{background-color:transparent!important}[style*="#000"],[style*="#000000"],[style*="rgb(0,0,0)"],[style*="rgb(0, 0, 0)"]{background-color:var(--bg0)!important}[style*="#fff"],[style*="#ffffff"],[style*="rgb(255,255,255)"],[style*="rgb(255, 255, 255)"]{color:var(--text)!important}html[data-oled],body[data-oled],.dark[data-oled],.theme-dark[data-oled]{background-color:var(--bg0)!important}`;let s=document.getElementById("real-dark-mode");if(!s){s=document.createElement("style");s.id="real-dark-mode";s.textContent=css;document.documentElement.appendChild(s)}})();</textarea>
  <button onclick="copyText('bookmarklet')">Copy Bookmarklet</button>
</div>


<script>
function copyText(id){
  const el=document.getElementById(id);
  el.select();
  document.execCommand('copy');
  alert('Copied!');
}
</script>
<script>
(() => {
    const css = `
:root{
    color-scheme:dark!important;

    --bg0:#141414;
    --bg1:#1b1b1b;
    --bg2:#222222;
    --bg3:#292929;

    --hover:#303030;
    --active:#383838;

    --text:#d2d2d2;
    --textSoft:#bbbbbb;
    --textFaint:#969696;

    --heading:#e2e2e2;

    --accent:#8cb4ff;
    --accentVisited:#b39ddb;

    --selectionBg:#3a3a3a;
    --selectionText:#ffffff;

    --codeBg:#1d1d1d;
    --inputBg:#202020;
}

html,
body{
    background-color:var(--bg0)!important;
    color:var(--text)!important;

    line-height:1.55!important;

    -webkit-font-smoothing:antialiased!important;
    text-rendering:optimizeLegibility!important;
}

body,
p,
span,
li,
td,
th,
label,
small,
caption,
figcaption,
blockquote,
dd,
dt{
    color:var(--text)!important;
}

h1,
h2,
h3,
h4,
h5,
h6,
strong,
b{
    color:var(--heading)!important;
}

small,
sub,
sup{
    color:var(--textFaint)!important;
}

a,
a *{
    color:var(--accent)!important;
}

a:visited,
a:visited *{
    color:var(--accentVisited)!important;
}

*{
    text-shadow:none!important;
    box-shadow:none!important;
    border-color:transparent!important;
    outline-color:transparent!important;
}

main,
section,
article,
aside,
nav,
header,
footer,
dialog,
menu,
details,
fieldset,
figure,
figcaption,
address,
.card,
.panel,
.sidebar,
.drawer,
.modal,
.popup,
.popover,
.dropdown,
.tooltip,
.toast,
[role="dialog"],
[role="menu"],
[role="tooltip"],
[class*="card"],
[class*="panel"],
[class*="modal"],
[class*="popup"],
[class*="popover"],
[class*="dropdown"],
[class*="sidebar"],
[class*="toolbar"],
[class*="titlebar"]{
    background-color:var(--bg1)!important;
}

main main,
section section,
article article,
aside aside,
div div,
.card .card,
.panel .panel,
.modal .modal,
.popup .popup{
    background-color:var(--bg2)!important;
}

main main main,
section section section,
article article article,
div div div{
    background-color:var(--bg3)!important;
}

input,
textarea,
select,
button,
optgroup,
option{
    background-color:var(--inputBg)!important;
    color:var(--text)!important;

    border:none!important;
}

input::placeholder,
textarea::placeholder{
    color:var(--textFaint)!important;
}

button:hover,
input:hover,
textarea:hover,
select:hover{
    background-color:var(--hover)!important;
}

button:active,
input:focus,
textarea:focus,
select:focus{
    background-color:var(--active)!important;
    outline:none!important;
}

table{
    background-color:var(--bg1)!important;
    color:var(--text)!important;

    border-collapse:collapse!important;
}

thead,
tfoot{
    background-color:var(--bg2)!important;
}

tbody tr:nth-child(odd){
    background-color:#1d1d1d!important;
}

tbody tr:nth-child(even){
    background-color:#242424!important;
}

tbody tr:hover{
    background-color:#303030!important;
}

td,
th{
    border:none!important;
    padding:.5em!important;
}

pre,
code,
kbd,
samp{
    background-color:var(--codeBg)!important;
    color:#d7d7d7!important;

    border:none!important;
}

ul,
ol,
li,
dl{
    background-color:transparent!important;
}

hr{
    border:none!important;
    height:1px!important;

    background-color:#303030!important;
}

img,
video,
canvas,
picture,
svg,
iframe{
    background-color:transparent!important;
}

svg text,
svg tspan{
    fill:var(--text)!important;
}

::selection{
    background-color:var(--selectionBg)!important;
    color:var(--selectionText)!important;
}

::-webkit-scrollbar{
    width:12px;
    height:12px;
}

::-webkit-scrollbar-track{
    background-color:var(--bg0)!important;
}

::-webkit-scrollbar-thumb{
    background-color:#404040!important;

    border-radius:999px!important;
}

::-webkit-scrollbar-thumb:hover{
    background-color:#505050!important;
}

#root,
#__next,
[data-reactroot]{
    background-color:var(--bg0)!important;
}

[class*="message"],
[class*="chat"],
[class*="conversation"]{
    background-color:transparent!important;
}

[style*="#000"],
[style*="#000000"],
[style*="rgb(0,0,0)"],
[style*="rgb(0, 0, 0)"]{
    background-color:var(--bg0)!important;
}

[style*="#fff"],
[style*="#ffffff"],
[style*="rgb(255,255,255)"],
[style*="rgb(255, 255, 255)"]{
    color:var(--text)!important;
}

html[data-oled],
body[data-oled],
.dark[data-oled],
.theme-dark[data-oled]{
    background-color:var(--bg0)!important;
}
`;

    let style = document.getElementById("real-dark-mode");

    if (!style) {
        style = document.createElement("style");
        style.id = "real-dark-mode";
        style.textContent = css;

        document.documentElement.appendChild(style);
    }
})();
</script>

</body>
</html>
